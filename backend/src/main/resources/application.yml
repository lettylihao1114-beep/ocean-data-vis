server:
  port: 8080

spring:
  application:
    name: ocean-data-vis
  cache:
    type: redis

  # 数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ocean_vis?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ocean.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: ocean-data-vis-2025-south-china-sea-jwt-secret-key-must-be-long-enough
  expiration: 86400000  # 24小时

# AI 大模型配置
ai:
  # DeepSeek 对话模型
  deepseek:
    key: sk-f4e6df38593942d39c06d6787557975f
    url: https://api.deepseek.com/v1/chat/completions
    model: deepseek-chat
  # SiliconFlow 嵌入模型（向量 RAG）
  siliconflow:
    key: sk-leonsxrichaxesttpdfrejtuxepbebhyxwjatuljyepzpxte
    url: https://api.siliconflow.cn/v1/embeddings
    model: BAAI/bge-large-zh-v1.5

# Knife4j API文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
